<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <g stroke="url(#glow)" stroke-width="1.5" fill="none" filter="url(#blur)">
    <line x1="32" y1="16" x2="17" y2="42"/>
    <line x1="17" y1="42" x2="47" y2="42"/>
    <line x1="47" y1="42" x2="32" y2="16"/>
  </g>
  <g stroke="url(#glow)" stroke-width="1" fill="none" opacity="0.8">
    <line x1="32" y1="16" x2="17" y2="42"/>
    <line x1="17" y1="42" x2="47" y2="42"/>
    <line x1="47" y1="42" x2="32" y2="16"/>
  </g>
  <circle cx="32" cy="16" r="5" fill="url(#glow)" opacity="0.3" filter="url(#blur)"/>
  <circle cx="32" cy="16" r="3.5" fill="url(#glow)"/>
  <circle cx="17" cy="42" r="5" fill="url(#glow)" opacity="0.3" filter="url(#blur)"/>
  <circle cx="17" cy="42" r="3.5" fill="url(#glow)"/>
  <circle cx="47" cy="42" r="5" fill="url(#glow)" opacity="0.3" filter="url(#blur)"/>
  <circle cx="47" cy="42" r="3.5" fill="url(#glow)"/>
</svg>
